<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyzzylu Lexicon Pro — Tournament Edition</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- DESIGN SYSTEM TOKENS --- */
    :root { 
      --bg: #000000; 
      --surface: #1C1C1E; 
      --surface2: #2C2C2E; 
      --border: #3A3A3C; 
      --accent: #34C759; 
      --danger: #FF3B30; 
      --orange: #FF9500; 
      --text: #FFFFFF; 
      --text2: #8E8E93; 
    }

    /* --- BASE STYLE RESETS --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 90px; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    mark { background: #FFE600; color: #000; border-radius: 2px; padding: 0 1px; font-weight: 700; }

    /* --- LOADING INFRASTRUCTURE --- */
    #loadingScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; }
    .spinner { width: 42px; height: 42px; border: 4px solid var(--surface); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- APPLICATION LAYOUT & NAVIGATION --- */
    header { position: sticky; top: 0; z-index: 100; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px; display: flex; justify-content: flex-end; }
    nav.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--text2); border: none; background: none; cursor: pointer; }
    .nav-item.active { color: var(--accent); }
    main { padding: 16px; max-width: 650px; margin: 0 auto; }
    .section { display: none; } 
    .section.active { display: block; }

    /* --- CAPSULE NAVIGATION ELEMENT --- */
    .capsule-wrapper { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 4px; display: flex; margin-bottom: 14px; }
    .capsule-btn { flex: 1; background: none; border: none; color: var(--text2); font-size: 13px; font-weight: 600; padding: 8px 0; cursor: pointer; border-radius: 25px; transition: 0.2s; text-align: center; }
    .capsule-btn.active { background: var(--text); color: var(--bg); }

    /* --- FORM CONTROLS & CARDS --- */
    .search-box { display: flex; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px 8px; align-items: center; margin-bottom: 14px; }
    .search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 16px; padding: 10px 12px; text-transform: uppercase; }
    .search-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--surface2); border: none; color: var(--text); cursor: pointer; }
    .drawer { height: 0; overflow: hidden; transition: 0.25s ease-in-out; background: var(--surface); border-radius: 12px; }
    .drawer.open { height: auto; padding: 14px; border: 1px solid var(--border); margin-bottom: 14px; }
    .f-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .f-stack { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .f-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 13px; }
    .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-p { background: var(--accent); border: none; color: var(--text); font-weight: 700; }
    .btn-not { padding: 4px 8px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: none; color: var(--text2); border-radius: 4px; }
    .btn-not.active { color: var(--danger); border-color: var(--danger); background: rgba(255, 59, 48, 0.1); }
    .input-field { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; position: relative; }
    
    /* --- RESULT LIST ARCHITECTURE --- */
    .item-row { border-bottom: 1px solid rgba(58, 58, 60, 0.5); padding: 12px 4px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .hook-box { color: var(--text2); font-size: 12px; padding: 2px 4px; background: rgba(44, 44, 46, 0.5); border-radius: 4px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .word-core { font-weight: 700; color: var(--text); cursor: pointer; font-size: 20px; letter-spacing: 0.5px; }
    .word-core:hover { color: var(--accent); }
    .dot-indicator { color: var(--danger); font-weight: 700; margin: 0 1px; font-size: 16px; }
    .score-badge { font-size: 14px; font-weight: 700; color: var(--orange); }

    /* --- QUIZ & REVEAL WINDOW SYSTEM --- */
    .q-clean-layout { display: flex; flex-direction: column; gap: 16px; }
    .quiz-history-pane { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
    
    /* --- FULL SCREEN OVERLAYS --- */
    .judge-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; cursor: pointer; }
    .judge-overlay.open { display: flex; }
    .judge-symbol { font-size: 96px; font-weight: bold; margin-bottom: 10px; line-height: 1; }
    .judge-status-text { font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 24px; }
    .judge-sub-list { font-size: 14px; color: var(--text2); max-width: 80%; overflow-y: auto; max-height: 30vh; }

    /* --- TOASTS & MODAL VIEWPORTS --- */
    .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; } 
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; }
    .modal-header { padding: 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; max-height: 55vh; overflow-y: auto; }
    .modal-footer { padding: 14px 16px; background: var(--surface2); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .info-label { font-size: 11px; color: var(--text2); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
    .info-val { font-size: 14px; color: var(--text); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="spinner"></div>
    <div class="mono" style="font-size: 13px; color: var(--text2)">LOADING Zyzzylu CORE...</div>
  </div>

  <header>
    <div class="mono" id="wCnt" style="font-size: 12px; color: var(--text2)">0 Words</div>
  </header>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nb-0" onclick="tab(0, this)">
      <span style="font-size:18px;">🔍</span><span>Search</span>
    </button>
    <button class="nav-item" id="nb-1" onclick="tab(1, this)">
      <span style="font-size:18px;">🧠</span><span>Quiz</span>
    </button>
    <button class="nav-item" id="nb-2" onclick="tab(2, this)">
      <span style="font-size:18px;">⚖️</span><span>Judge</span>
    </button>
    <button class="nav-item" id="nb-3" onclick="tab(3, this)">
      <span style="font-size:18px;">📚</span><span>Saved</span>
    </button>
  </nav>

  <main>
    <div class="section active" id="t0">
      <div class="capsule-wrapper mono">
        <button class="capsule-btn active" id="sm-subanagram" onclick="setSearchMode('subanagram')">Subanagram</button>
        <button class="capsule-btn" id="sm-anagram" onclick="setSearchMode('anagram')">Anagram</button>
        <button class="capsule-btn" id="sm-pattern" onclick="setSearchMode('pattern')">Pattern</button>
      </div>

      <div class="search-box">
        <input class="mono" id="sInp" type="text" placeholder="Enter rack for Subanagrams..." onkeydown="if(event.key==='Enter')search()">
        <button class="search-btn" onclick="search()">→</button>
      </div>
      
      <button class="btn mono" style="width:100%; padding:8px; margin-bottom:14px;" onclick="document.getElementById('sDrw').classList.toggle('open')">⚙️ ADVANCED FILTERS</button>
      
      <div class="drawer" id="sDrw">
        <div class="f-row">
          <select class="input-field" id="sFType" style="padding:6px; flex:1; background:var(--bg);">
            <option value="length">Length Range</option>
            <option value="point_value">Point Value Range</option>
            <option value="begins">Begins With</option>
            <option value="ends">Ends With</option>
          </select>
          <button class="btn btn-p" onclick="addFilter('S')" style="padding:6px 12px;">+ Add</button>
        </div>
        <div class="f-stack" id="sStack"></div>
      </div>
      <div id="sRes"></div>
    </div>

    <div class="section" id="t1">
      <div class="card" id="qBox">
        <div id="qSettingsPane">
          <div style="display: flex; justify-content: space-between; margin-bottom: 14px; align-items: center;">
            <span style="font-weight: 700; font-size: 16px;">Quiz Parameters</span>
            <button class="btn mono" style="padding: 4px 8px; font-size: 11px;" onclick="document.getElementById('fInp').click()">📂 LOAD</button>
          </div>
          <div class="f-row">
            <select class="input-field" id="qFType" style="padding: 6px; flex: 1; background:var(--bg);">
              <option value="length">Length Range</option>
              <option value="point_value">Point Value Range</option>
              <option value="includes">Includes Letters</option>
              <option value="begins">Begins With</option>
              <option value="ends">Ends With</option>
            </select>
            <button class="btn" onclick="addFilter('Q')">+ Add</button>
          </div>
          <div class="f-stack" id="qStack" style="margin-bottom: 14px;"></div>
          <button class="btn btn-p" style="width: 100%" onclick="startQuiz()">START QUIZ</button>
        </div>
        <div id="qEnginePane" style="display: none;"></div>
      </div>
    </div>

    <div class="section" id="t2">
      <div class="card" style="min-height: 180px; padding-top: 50px;">
        <button class="btn btn-p" onclick="chkChal()" style="position: absolute; top: 14px; right: 14px; padding: 6px 14px; font-size: 12px;">JUDGE</button>
        <div class="f-row" style="margin-top: 10px;">
          <input type="text" id="cInp" class="input-field mono" style="background: transparent; border-color: transparent; border-bottom: 2px solid var(--border); border-radius: 0; font-size: 20px; text-align: center;" placeholder="Enter words..." onkeydown="if(event.key==='Enter')chkChal()">
        </div>
      </div>
    </div>

    <div class="section" id="t3">
      <div style="display: flex; justify-content: space-between; margin-bottom: 14px; align-items: center;">
        <h3 style="font-size: 16px;">Bookmarks</h3>
        <button class="btn" style="color: var(--danger); padding: 4px 10px; font-size:12px;" onclick="clearSaved()">Clear All</button>
      </div>
      <div id="bList"></div>
    </div>
  </main>

  <div class="judge-overlay" id="jOverlay" onclick="this.classList.remove('open')">
    <div class="judge-symbol" id="jSymbol">✓</div>
    <div class="judge-status-text" id="jStatus">Valid</div>
    <div class="mono judge-sub-list" id="jSubList"></div>
  </div>

  <div class="modal-overlay" id="uluModal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 class="mono" id="mWord" style="font-size: 32px; font-weight: 700;">WORD</h2>
          <span class="mono" id="mPos" style="font-size: 13px; color: var(--accent);">n.</span>
        </div>
        <div style="text-align: right;">
          <div class="mono" id="mScore" style="font-size: 28px; font-weight: 700; color: var(--orange)">00</div>
          <span style="font-size: 10px; color: var(--text2);">BASE SCORE</span>
        </div>
      </div>
      <div class="modal-body">
        <div>
          <div class="info-label">Definitions</div>
          <div class="info-val" id="mDef" style="color: var(--text2);"></div>
        </div>
        <div class="info-grid">
          <div>
            <div class="info-label">Front Hooks</div>
            <div class="info-val mono" id="mFHooks" style="color: var(--accent);">-</div>
          </div>
          <div>
            <div class="info-label">Back Hooks</div>
            <div class="info-val mono" id="mBHooks" style="color: var(--accent);">-</div>
          </div>
        </div>
        <div>
          <div class="info-label">Anagrams</div>
          <div class="info-val mono" id="mAnagrams" style="color: var(--text2)">None</div>
        </div>
        <div>
          <div class="info-label">Inflections</div>
          <div class="info-val mono" id="mInflections" style="color: var(--orange)">None</div>
        </div>
      </div>
      <div class="modal-footer">
        <div style="display: flex; gap: 6px;"><button class="btn" onclick="navWord(-1)">◀</button><button class="btn" onclick="navWord(1)">▶</button></div>
        <div style="display: flex; gap: 6px;">
          <button class="btn" id="mFavBtn" onclick="favWord()">⭐</button>
          <button class="btn" onclick="closeUlu()" style="color:var(--danger);">CLOSE</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="tst"></div>
  <input type="file" id="fInp" style="display: none" accept=".zzq" onchange="loadZzq(event)">

  <script>
    let dict = [], dictSet = new Set(), wordsByL = {};
    let saved = JSON.parse(localStorage.getItem('zyz_sv') || '[]');
    let sFilters = [], qFilters = [], fId = 0;
    
    let qState = { 
      pool: [], rawWords: [], rack: '', sol: [], 
      correctAnswers: [], incorrectAttempts: [],
      userSkipped: false, setsDone: 0,
      analysis: null // โครงสร้างรับประวัติความอ่อนแอเสริมนอกเหนือจากเซ็ตปกติ
    };
    
    let activeSearchMode = 'subanagram', currentResultsList = [], currentWordIndex = -1;
    const letterScores = { A:1,E:1,I:1,O:1,U:1,L:1,N:1,S:1,T:1,R:1, D:2,G:2, B:3,C:3,M:3,P:3, F:4,H:4,V:4,W:4,Y:4, K:5, J:8,X:8, Q:10,Z:10 };
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    /* --- MATH & CORE DICTIONARY UTILITIES --- */
    const getWordScore = w => [...w].reduce((a, c) => a + (letterScores[c] || 0), 0);

    function getHooksAndDots(w) {
      let f = '', b = '';
      for (let i = 0; i < 26; i++) {
        if (dictSet.has(alpha[i] + w)) f += alpha[i];
        if (dictSet.has(w + alpha[i])) b += alpha[i];
      }
      return { 
        f: f || '-', b: b || '-', 
        dotF: (w.length > 2 && dictSet.has(w.substring(1))) ? '•' : '&nbsp;', 
        dotB: (w.length > 2 && dictSet.has(w.substring(0, w.length - 1))) ? '•' : '&nbsp;' 
      };
    }

    function getWordMetadata(w) {
      let ana = dict.filter(x => x.length === w.length && x !== w && [...x].sort().join('') === [...w].sort().join(''));
      let inf = ['S','ES','ED','ING'].filter(s => dictSet.has(w + s)).map(s => w + s);
      let p = "n.";
      if (w.endsWith('ED') || w.endsWith('ING')) p = "v.";
      else if (w.endsWith('LY')) p = "adv.";
      else if (w.endsWith('ABLE') || w.endsWith('FUL')) p = "adj.";
      return { pos: p, def: "", anagrams: ana.join(', ') || 'None', inflections: inf.join(', ') || 'None' };
    }

    /* --- INITIALIZATION STAGE --- */
    window.onload = async () => {
      try {
        let r = await fetch('CSW24.txt');
        dict = (await r.text()).split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
        dictSet = new Set(dict);
        dict.forEach(w => { (wordsByL[w.length] = wordsByL[w.length] || []).push(w); });
        document.getElementById('wCnt').innerText = dict.length.toLocaleString() + " Words";
      } catch(e) { document.getElementById('wCnt').innerText = "Sandbox Mode"; }
      document.getElementById('loadingScreen').style.display = 'none';
      renderSaved();
    };

    /* --- UI MANAGEMENT ENGINE --- */
    function tab(idx, b) {
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active')); 
      b.classList.add('active');
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
    }
    
    function toast(m, cls = '') {
      let t = document.getElementById('tst'); t.innerText = m; t.className = 'toast show ' + cls;
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function setSearchMode(mode) {
      activeSearchMode = mode;
      document.querySelectorAll('.capsule-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sm-' + mode).classList.add('active');
      document.getElementById('sInp').placeholder = mode === 'pattern' ? "Use . (1 char) or * (multi)..." : "Enter letters...";
    }

    /* --- FILTER CRITERIA GENERATOR --- */
    function addFilter(mode) {
      fId++; 
      let type = document.getElementById(mode === 'S' ? 'sFType' : 'qFType').value;
      let isR = (type === 'length' || type === 'point_value');
      let item = { id: fId, type, v1: isR ? '2' : '', v2: isR ? '8' : '', not: false };
      if (mode === 'S') { sFilters.push(item); renderFilters('S'); } else { qFilters.push(item); renderFilters('Q'); }
    }
    function toggleNot(mode, id) {
      let arr = mode === 'S' ? sFilters : qFilters;
      let f = arr.find(x => x.id === id); if (f) f.not = !f.not; renderFilters(mode);
    }
    function deleteFilter(mode, id) {
      if (mode === 'S') { sFilters = sFilters.filter(x => x.id !== id); renderFilters('S'); } 
      else { qFilters = qFilters.filter(x => x.id !== id); renderFilters('Q'); }
    }
    function updateFilterVal(mode, id, field, val) {
      let arr = mode === 'S' ? sFilters : qFilters;
      let f = arr.find(x => x.id === id); if (f) f[field] = val.toUpperCase();
    }
    function renderFilters(mode) {
      let arr = mode === 'S' ? sFilters : qFilters;
      document.getElementById(mode === 'S' ? 'sStack' : 'qStack').innerHTML = arr.map(f => {
        let isR = (f.type === 'length' || f.type === 'point_value');
        return `
          <div class="f-item">
            <div style="display:flex; gap:6px; align-items:center; flex:1;">
              <button class="btn-not ${f.not ? 'active' : ''}" onclick="toggleNot('${mode}', ${f.id})">NOT</button>
              <span class="mono" style="color:var(--accent); font-size:11px;">${f.type.toUpperCase()}</span>
              ${isR ? 
                `<input type="number" style="width:44px; background:var(--bg); color:#fff; border:1px solid var(--border); padding:2px;" value="${f.v1}" onchange="updateFilterVal('${mode}', ${f.id}, 'v1', this.value)"> - <input type="number" style="width:44px; background:var(--bg); color:#fff; border:1px solid var(--border); padding:2px;" value="${f.v2}" onchange="updateFilterVal('${mode}', ${f.id}, 'v2', this.value)">`
                : `<input type="text" style="flex:1; background:var(--bg); color:#fff; border:1px solid var(--border); padding:2px;" value="${f.v1}" oninput="updateFilterVal('${mode}', ${f.id}, 'v1', this.value)">`
              }
            </div>
            <span style="cursor:pointer; color:var(--danger);" onclick="deleteFilter('${mode}', ${f.id})">✕</span>
          </div>
        `;
      }).join('');
    }

    function matchFilters(w, arr) {
      for (let f of arr) {
        let m = true, v1 = f.v1.trim().toUpperCase();
        if (f.type === 'length') m = (w.length >= parseInt(f.v1) && w.length <= parseInt(f.v2));
        else if (f.type === 'point_value') { let s = getWordScore(w); m = (s >= parseInt(f.v1) && s <= parseInt(f.v2)); }
        else if (f.type === 'begins') m = w.startsWith(v1);
        else if (f.type === 'ends') m = w.endsWith(v1);
        else if (f.type === 'includes') m = [...v1].every(c => w.includes(c));
        if (f.not) m = !m; if (!m) return false;
      }
      return true;
    }

    /* --- SEARCH STRATEGY & WILDCARD HIGHLIGHT --- */
    function highlightPatternMatches(word, query) {
      if (!query.includes('.')) return word;
      let res = "";
      for (let i = 0; i < word.length; i++) {
        if (query[i] === '.') res += `<mark>${word[i]}</mark>`;
        else res += word[i];
      }
      return res;
    }

    function search() {
      let q = document.getElementById('sInp').value.trim().toUpperCase();
      let res = [];
      if (!q) return;

      if (activeSearchMode === 'anagram') {
        let sq = [...q].sort().join('');
        res = dict.filter(w => w.length === q.length && [...w].sort().join('') === sq && matchFilters(w, sFilters));
      } else if (activeSearchMode === 'subanagram') {
        res = dict.filter(w => {
          let r = [...q];
          return [...w].every(c => { let i = r.indexOf(c); if (i > -1) { r.splice(i, 1); return true; } return false; }) && matchFilters(w, sFilters);
        });
      } else if (activeSearchMode === 'pattern') {
        let rx = new RegExp("^" + q.replace(/\./g, '.').replace(/\*/g, '.*') + "$");
        res = dict.filter(w => rx.test(w) && matchFilters(w, sFilters));
      }

      currentResultsList = res.slice(0, 100);
      document.getElementById('sRes').innerHTML = currentResultsList.map((w, idx) => {
        let hk = getHooksAndDots(w);
        let showW = activeSearchMode === 'pattern' ? highlightPatternMatches(w, q) : w;
        return `
          <div class="item-row">
            <div style="display:flex; align-items:center; gap:8px; flex:1; overflow:hidden;">
              <div class="mono hook-box">${hk.f}</div>
              <div class="mono" style="white-space:nowrap; display:flex; align-items:center;">
                <span class="dot-indicator">${hk.dotF}</span>
                <span class="word-core" onclick="openUlu(${idx})">${showW}</span>
                <span class="dot-indicator">${hk.dotB}</span>
              </div>
              <div class="mono hook-box">${hk.b}</div>
            </div>
            <div class="mono score-badge">
              <span style="font-size:10px; color:var(--text2); margin-right:4px;">${w.length}L</span>${getWordScore(w)}
            </div>
          </div>
        `;
      }).join('') || '<p style="text-align:center; color:var(--text2); padding-top:20px;">No results found</p>';
    }

    /* --- WORD DETAIL MODAL CORE --- */
    function openUlu(idx) {
      if (idx < 0 || idx >= currentResultsList.length) return;
      currentWordIndex = idx;
      let w = currentResultsList[idx], hk = getHooksAndDots(w), meta = getWordMetadata(w);

      document.getElementById('mWord').innerText = w;
      document.getElementById('mPos').innerText = meta.pos;
      document.getElementById('mScore').innerText = getWordScore(w);
      document.getElementById('mDef').innerText = meta.def;
      document.getElementById('mFHooks').innerText = hk.f;
      document.getElementById('mBHooks').innerText = hk.b;
      document.getElementById('mAnagrams').innerText = meta.anagrams;
      document.getElementById('mInflections').innerText = meta.inflections;

      let btn = document.getElementById('mFavBtn');
      btn.innerText = saved.includes(w) ? "⭐" : "☆";
      document.getElementById('uluModal').classList.add('open');
    }
    const closeUlu = () => document.getElementById('uluModal').classList.remove('open');
    function navWord(dir) { let n = currentWordIndex + dir; if (n >= 0 && n < currentResultsList.length) openUlu(n); }
    function favWord() {
      let w = currentResultsList[currentWordIndex];
      if (saved.includes(w)) saved = saved.filter(x => x !== w); else saved.push(w);
      localStorage.setItem('zyz_sv', JSON.stringify(saved)); renderSaved(); openUlu(currentWordIndex);
    }

    /* --- Zyzzylu MANUAL FLOW QUIZ ENGINE --- */
    function startQuiz() {
      let p = dict.filter(w => matchFilters(w, qFilters));
      if (!p.length) { alert("No pools found matching criteria"); return; }
      qState.rawWords = p; 
      qState.pool = Array.from(new Set(p.map(w => [...w].sort().join('')))); 
      qState.setsDone = 0;
      qState.analysis = null; // ล้างประวัติเก่าเมื่อเปิดโหมดแมนนวลเอง
      document.getElementById('qSettingsPane').style.display = 'none'; 
      document.getElementById('qEnginePane').style.display = 'block';
      nextQ();
    }
    
    function quitQuiz() {
      qState.rawWords = []; qState.pool = []; qState.setsDone = 0; qState.analysis = null;
      document.getElementById('qEnginePane').style.display = 'none'; 
      document.getElementById('qSettingsPane').style.display = 'block';
    }
    
    function nextQ() {
      qState.correctAnswers = []; qState.incorrectAttempts = []; qState.userSkipped = false;
      let currentRack = qState.pool[qState.setsDone]; 
      qState.rack = currentRack;
      qState.sol = dict.filter(w => w.length === currentRack.length && [...w].sort().join('') === currentRack);
      renderQuiz();
    }
    
    function updateQuizButton() {
      let inp = document.getElementById('qInp');
      let btn = document.getElementById('qActionBtn');
      if (!inp || !btn) return;

      let isComplete = (qState.correctAnswers.length === qState.sol.length) || qState.userSkipped;
      let isLast = (qState.setsDone === qState.pool.length - 1);

      if (isComplete) {
        btn.innerText = isLast ? "Analyze" : "Next";
      } else {
        btn.innerText = inp.value.trim() ? "Submit" : "Check Answer";
      }
    }

    function renderQuiz() {
      let isComplete = (qState.correctAnswers.length === qState.sol.length) || qState.userSkipped;
      let isLast = (qState.setsDone === qState.pool.length - 1);
      
      let actionText = isComplete ? (isLast ? "Analyze" : "Next") : "Check Answer";

      let historyHtml = qState.correctAnswers.map(w => {
        let hk = getHooksAndDots(w);
        return `<div class="mono" style="font-size:14px; color:var(--accent); padding:2px 0;">✓ (${hk.f}) <b>${w}</b> (${hk.b})</div>`;
      }).join('');

      let revealHtml = "";
      if (qState.userSkipped) {
        let missed = qState.sol.filter(w => !qState.correctAnswers.includes(w));
        revealHtml = missed.map(w => {
          let hk = getHooksAndDots(w);
          return `<div class="mono" style="font-size:14px; color:var(--orange); padding:2px 0;">• (${hk.f}) <b>${w}</b> (${hk.b}) [Missed]</div>`;
        }).join('');
      }

      document.getElementById('qEnginePane').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <div class="mono" style="font-size:12px; color:var(--text2)">POOL: ${qState.setsDone + 1} / ${qState.pool.length}</div>
          <div class="mono" style="font-size:14px; color:var(--accent); font-weight:700;">${qState.correctAnswers.length} / ${qState.sol.length}</div>
        </div>
        <div class="mono" style="font-size:34px; font-weight:700; text-align:center; margin:12px 0; letter-spacing:5px;">${qState.rack}</div>
        
        <div class="q-clean-layout">
          <div class="quiz-history-pane" id="qHistBox" style="${(qState.correctAnswers.length || qState.userSkipped) ? '' : 'display:none;'}">
            ${historyHtml}
            ${revealHtml}
          </div>

          <input type="text" id="qInp" class="input-field mono" style="text-align:center;" 
            placeholder="${isComplete ? 'Press Next/Analyze to proceed...' : 'Type answer...'}" 
            ${isComplete ? 'disabled' : ''} 
            oninput="updateQuizButton()"
            onkeydown="if(event.key==='Enter')handleQuizAction()">
          
          <div style="display:flex; gap:8px;">
            <button class="btn btn-p" id="qActionBtn" style="flex:1; color:#fff;" onclick="handleQuizAction()">${actionText}</button>
            <button class="btn" style="flex:1; color:var(--orange);" onclick="analyzeQuizSet(false)">ANALYZE</button>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn" style="flex:1; color:var(--orange);" onclick="saveCurrentZzq()">💾 SAVE</button>
            <button class="btn" style="flex:1; color:var(--danger);" onclick="quitQuiz()">❌ QUIT</button>
          </div>
        </div>
      `;
      if (!isComplete) setTimeout(() => document.getElementById('qInp').focus(), 50);
    }
    
    function handleQuizAction() {
      let isComplete = (qState.correctAnswers.length === qState.sol.length) || qState.userSkipped;
      let isLast = (qState.setsDone === qState.pool.length - 1);

      if (isComplete) {
        if (isLast) { analyzeQuizSet(true); } 
        else { qState.setsDone++; nextQ(); }
        return;
      }

      let inp = document.getElementById('qInp');
      let v = inp.value.trim().toUpperCase();
      
      if (!v) {
        qState.userSkipped = true;
        toast("Revealing Pool...");
        renderQuiz();
        return;
      }
      
      if (qState.sol.includes(v)) {
        if (!qState.correctAnswers.includes(v)) qState.correctAnswers.push(v);
      } else {
        if (!qState.incorrectAttempts.includes(v)) qState.incorrectAttempts.push(v);
      }
      
      inp.value = '';
      renderQuiz();
    }
    
    function analyzeQuizSet(isGameOver = false) {
      let corrected = [], skipped = [], invalidated = [];
      qState.sol.forEach(w => {
        if (qState.correctAnswers.includes(w)) {
          if (qState.incorrectAttempts.length > 0) invalidated.push(w); else corrected.push(w);
        } else { skipped.push(w); }
      });

      let correctHtml = corrected.map(w => `<div style="color:var(--accent)">✓ ${w}</div>`).join('') || '<div>None</div>';
      let skippedHtml = skipped.map(w => `<div style="color:var(--orange)">• ${w}</div>`).join('') || '<div>None</div>';
      let incorrectHtml = qState.incorrectAttempts.map(w => `<div style="color:var(--danger)">✕ ${w}</div>`).join('');
      let convertedHtml = invalidated.map(w => `<div style="color:var(--danger)">⚠ ${w} (Invalidated)</div>`).join('');

      // แทรกหัวข้อรายงานประวัติสกปรกจากไฟล์คอมพิวเตอร์ (ถ้ามี)
      let legacyHistoryHtml = "";
      if(qState.analysis && qState.analysis.incorrectHistory.length > 0) {
        legacyHistoryHtml = `
          <div style="margin-top:10px; border-top:1px dashed var(--border); padding-top:10px;">
            <div style="color:var(--danger); font-weight:700;">PC MISSED / INCORRECT HISTORY (ประวัติเดามั่วบนคอม):</div>
            ${qState.analysis.incorrectHistory.map(h => `<div style="color:var(--text2)">⚠️ ${h.word} (ผิดสถิติ ${h.count} ครั้ง)</div>`).join('')}
          </div>`;
      }

      let footerBtnHtml = isGameOver 
        ? `<button class="btn" style="width:100%; margin-top:14px; color:var(--danger); border-color:var(--danger);" onclick="quitQuiz()">GAME OVER — CLICK TO QUIT</button>`
        : `<button class="btn btn-p" style="width:100%; margin-top:14px;" onclick="renderQuiz()">BACK TO CURRENT QUIZ</button>`;

      document.getElementById('qEnginePane').innerHTML = `
        <h3 class="mono" style="font-size:15px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:6px;">Review Grid Analysis</h3>
        <div class="mono" style="font-size:12px; display:flex; flex-direction:column; gap:12px; max-height:280px; overflow-y:auto; background:#000; padding:10px; border-radius:6px;">
          <div><div style="color:var(--text2); font-weight:700;">CORRECT SOLUTIONS:</div>${correctHtml}</div>
          <div><div style="color:var(--text2); font-weight:700;">SKIPPED / MISSED WORDS:</div>${skippedHtml}</div>
          <div><div style="color:var(--text2); font-weight:700;">ERRORS & INVALIDATED:</div>${incorrectHtml || '<div>None</div>'}${convertedHtml}</div>
          ${legacyHistoryHtml}
        </div>
        ${footerBtnHtml}
      `;
    }
    
    /* --- Zyzzyva NATIVE XML QUIZ EXPORT (.zzq Generation Matrix) --- */
    function saveCurrentZzq() {
      if (!qState.rawWords.length) return;
      
      let fName = prompt("พิมพ์ชื่อไฟล์ควิซที่ต้องการบันทึก:", "zyzzylu_quiz");
      if (fName === null) return; 
      fName = fName.trim() || "zyzzylu_quiz";
      if (!fName.toLowerCase().endsWith(".zzq")) fName += ".zzq";

      let totalW = qState.rawWords.length;
      
      let xml = [
        '<?xml version="1.0" encoding="ISO-8859-1"?>',
        '<!DOCTYPE zyzzyva-quiz SYSTEM \'http://boshvark.com/dtd/zyzzyva-quiz.dtd\'>',
        '<zyzzyva-quiz method="Standard" lexicon="CSW24" question-order="Random" type="Anagrams">',
        ' <question-source type="search">',
        '  <zyzzyva-search version="1">',
        '   <conditions>',
        '    <and>',
        '     <condition max="15" min="2" type="Length"/>',
        '    </and>',
        '   </conditions>',
        '  </zyzzyva-search>',
        ' </question-source>',
        ' <randomizer algorithm="1" seed="1725958103" seed2="244"/>',
        ` <progress question-complete="true" correct-questions="${totalW}" total-questions="${totalW}" correct="${totalW}" question="${totalW}">`,
        '  <question-correct-responses>'
      ];

      qState.rawWords.forEach(w => {
        xml.push(`   <response word="${w}"/>`);
      });

      xml.push('  </question-correct-responses>');
      xml.push(' </progress>');
      xml.push('</zyzzyva-quiz>');

      let blob = new Blob([xml.join("\r\n")], { type: "text/xml;charset=utf-8" });
      let a = document.createElement("a"); 
      a.download = fName; 
      a.href = window.URL.createObjectURL(blob);
      document.body.appendChild(a); 
      a.click(); 
      document.body.removeChild(a);
      toast(` Saved ${fName} Successfully`);
    }
    
    /* --- BUG-FREE SEEDABLE DETERMINISTIC PRNG ENGINE --- */
    function createSeedableRandom(seed1, seed2) {
      let s1 = Number(seed1) || 0;
      let s2 = Number(seed2) || 0;
      return function() {
        // ใช้ Math.imul ประมวลผล 32-bit integer เที่ยงตรงระดับฮาร์ดแวร์ ป้องกันสุ่มเพี้ยนข้ามเครื่อง
        s1 = (Math.imul(s1, 1664525) + 1013904223) >>> 0;
        s2 = (Math.imul(s2, 1103515245) + 12345) >>> 0;
        return ((s1 ^ s2) >>> 0) / 4294967296;
      };
    }

    function shuffleWithSeed(array, seed1, seed2) {
      let myRandom = createSeedableRandom(seed1, seed2);
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(myRandom() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    /* --- Zyzzyva XML PARSER MATRIX (.zzq Loading Architecture) --- */
    function loadZzq(e) {
      let f = e.target.files[0]; if (!f) return; 
      let r = new FileReader();
      r.onload = (x) => {
        try {
          let content = x.target.result.trim();

          // --- [CASE A: LEGACY PLAIN TEXT MODE] ---
          if (!content.startsWith("<?xml")) {
            let loaded = content.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => dictSet.has(w));
            if (!loaded.length) { alert("Error: No lexicon words matched in text file."); return; }
            qState.rawWords = loaded; 
            qState.pool = Array.from(new Set(loaded.map(w => [...w].sort().join('')))); 
            qState.setsDone = 0;
            qState.analysis = null;
            
            document.getElementById('qSettingsPane').style.display = 'none'; 
            document.getElementById('qEnginePane').style.display = 'block';
            nextQ();
            toast(`📦 Loaded ${loaded.length} Plain Words`);
            return;
          }

          // --- [CASE B: NATIVE ZYZZYVA XML DEEP INTEGRATION] ---
          let parser = new DOMParser();
          let xmlDoc = parser.parseFromString(content, "text/xml");
          
          if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
            alert("XML Error: Corrupted file structure.");
            return;
          }

          // 1. ถอดรหัสระบบเงื่อนไขเพื่อซิงก์ตารางตัวกรองหลัก
          let conditions = xmlDoc.getElementsByTagName("condition");
          if (conditions.length > 0) {
            qFilters = [];
            let localFId = 0;
            for (let i = 0; i < conditions.length; i++) {
              let cond = conditions[i];
              let zType = cond.getAttribute("type");
              let negated = cond.getAttribute("negated") === "1";
              localFId++;
              let item = { id: localFId, type: "", v1: "", v2: "", not: negated };

              if (zType === "Length") {
                item.type = "length"; item.v1 = cond.getAttribute("min") || "2"; item.v2 = cond.getAttribute("max") || "15";
              } else if (zType === "Includes Letters") {
                item.type = "includes"; item.v1 = cond.getAttribute("string") || "";
              } else if (zType === "Begins With") {
                item.type = "begins"; item.v1 = cond.getAttribute("string") || "";
              } else if (zType === "Ends With") {
                item.type = "ends"; item.v1 = cond.getAttribute("string") || "";
              } else if (zType === "Point Value") {
                item.type = "point_value"; item.v1 = cond.getAttribute("min") || "1"; item.v2 = cond.getAttribute("max") || "99";
              } else { continue; }
              qFilters.push(item);
            }
            renderFilters('Q'); // วาด UI บอร์ดฟิลเตอร์ตามเงื่อนไขที่คอมให้มาทันที
          }

          // คัดคำในดิคหลักที่ตรงกรอบ
          let matchedWords = dict.filter(w => matchFilters(w, qFilters));
          if (!matchedWords.length) {
            // ถ้าระบบฟิลเตอร์แอดวานซ์ไม่เจอ ให้เก็บคำจากกระดาน response โดยตรง (Fallback Matrix)
            let responses = xmlDoc.getElementsByTagName("response");
            for (let i = 0; i < responses.length; i++) {
              let w = responses[i].getAttribute("word");
              if (w && dictSet.has(w.trim().toUpperCase())) matchedWords.push(w.trim().toUpperCase());
            }
          }

          // 2. ขุดประวัติความอ่อนแอฝังลง Analyze Architecture
          let progressNode = xmlDoc.getElementsByTagName("progress")[0];
          qState.analysis = {
            pastCorrectCount: progressNode ? parseInt(progressNode.getAttribute("correct") || "0") : 0,
            pastTotalQuestions: progressNode ? parseInt(progressNode.getAttribute("question") || "0") : 0,
            incorrectHistory: [],
            missedHistory: []
          };

          let incParent = xmlDoc.getElementsByTagName("incorrect-responses")[0];
          if (incParent) {
            let res = incParent.getElementsByTagName("response");
            for (let i = 0; i < res.length; i++) {
              qState.analysis.incorrectHistory.push({
                word: res[i].getAttribute("word").toUpperCase(),
                count: parseInt(res[i].getAttribute("count") || "1")
              });
            }
          }

          let misParent = xmlDoc.getElementsByTagName("missed-responses")[0];
          if (misParent) {
            let res = misParent.getElementsByTagName("response");
            for (let i = 0; i < res.length; i++) {
              qState.analysis.missedHistory.push({
                word: res[i].getAttribute("word").toUpperCase(),
                count: parseInt(res[i].getAttribute("count") || "1")
              });
            }
          }

          // 3. ปลดล็อก Seed พลังสุ่มผูกมัดลำดับโจทย์
          let randomizerNode = xmlDoc.getElementsByTagName("randomizer")[0];
          let seed1 = randomizerNode ? randomizerNode.getAttribute("seed") : null;
          let seed2 = randomizerNode ? randomizerNode.getAttribute("seed2") : null;
          let questionOrder = xmlDoc.getElementsByTagName("zyzzyva-quiz")[0]?.getAttribute("question-order");

          qState.rawWords = matchedWords;
          let uniquePool = Array.from(new Set(matchedWords.map(w => [...w].sort().join(''))));

          if (questionOrder === "Random" && seed1 && seed2) {
            qState.pool = shuffleWithSeed(uniquePool, seed1, seed2);
            toast(`🔏 Seed Synced: ลำดับโจทย์ตรงกับ PC เปี๊ยบ!`);
          } else {
            qState.pool = uniquePool;
          }

          qState.setsDone = 0;
          document.getElementById('qSettingsPane').style.display = 'none'; 
          document.getElementById('qEnginePane').style.display = 'block';
          nextQ();
          toast(`📊 โหลดข้อมูลประวัติคำผิดและสถิติจาก PC สำเร็จ!`);
        } catch (err) {
          alert("XML Error: ไม่สามารถถอดโครงสร้างเมทริกซ์ .zzq ได้");
        }
      }; 
      r.readAsText(f);
    }

    /* --- JUDGE ARENA ENGINE --- */
    function chkChal() {
      let val = document.getElementById('cInp').value.trim().toUpperCase(); if (!val) return;
      let words = val.split(/\s+/), allValid = words.every(w => dictSet.has(w));
      let sym = document.getElementById('jSymbol'), stat = document.getElementById('jStatus');
      
      document.getElementById('jSubList').innerText = words.join(', ');
      if (allValid) {
        sym.innerText = "✓"; sym.style.color = "var(--accent)";
        stat.innerText = "Valid"; stat.style.color = "var(--accent)";
      } else {
        sym.innerText = "✕"; sym.style.color = "var(--danger)";
        stat.innerText = "Not valid"; stat.style.color = "var(--danger)";
      }
      document.getElementById('jOverlay').classList.add('open');
      document.getElementById('cInp').value = '';
    }

    /* --- LOCAL STORAGE BOOKMARKS --- */
    function renderSaved() {
      document.getElementById('bList').innerHTML = saved.map(w => `
        <div class="item-row">
          <span class="mono" style="font-size:18px; font-weight:700;">${w}</span>
          <button class="btn" style="padding:4px 8px; color:var(--danger); border-color:transparent;" onclick="toggleSave('${w}')">🗑️</button>
        </div>
      `).join('') || '<p style="text-align:center; color:var(--text2); padding-top:16px;">No saved items</p>';
    }
    function toggleSave(w) {
      saved = saved.includes(w) ? saved.filter(x => x !== w) : [...saved, w];
      localStorage.setItem('zyz_sv', JSON.stringify(saved)); renderSaved();
    }
    function clearSaved() { if (confirm("Purge all stored words?")) { saved = []; localStorage.setItem('zyz_sv', '[]'); renderSaved(); } }
  </script>
