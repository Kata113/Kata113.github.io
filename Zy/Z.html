<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZYZZYVA — CSW24 Ultimate Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3d;
  --accent: #7c6af7;
  --accent2: #f7a06a;
  --accent3: #6af7c4;
  --text: #e8e8f0;
  --text2: #8888aa;
  --danger: #f76a6a;
  --success: #6af7a0;
  --info: #6ae7f7;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

/* NEW BEAUTIFUL NEON LOADER */
#loadingScreen {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.spinner-box { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; background: transparent; }
.circle-border { width: 60px; height: 60px; padding: 3px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: linear-gradient(0deg, rgba(124,106,247,0.1) 33%, rgba(124,106,247,1) 100%); animation: spin .8s linear infinite; }
.circle-core { width: 100%; height: 100%; background-color: var(--bg); border-radius: 50%; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.load-status-text { font-family:'Space Mono',monospace; font-size:13px; color:var(--accent3); letter-spacing:1px; text-transform:uppercase; text-shadow:0 0 10px rgba(106,247,196,0.2); text-align:center; padding:0 20px; }

header {
  position:sticky; top:0; z-index:100; background:rgba(10,10,15,0.92); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
}
.logo { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; letter-spacing:4px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.word-count { font-family:'Space Mono',monospace; font-size:11px; color:var(--text2); }

nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:57px; z-index:99; }
.tab { flex:1; padding:12px 8px; text-align:center; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text2); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-icon { font-size:16px; display:block; margin-bottom:2px; }

main { padding:20px; position:relative; z-index:1; max-width:600px; margin:0 auto; width:100%; }
.section { display:none; animation:fadeUp 0.3s ease; width:100%; }
.section.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* SEARCH TAB LIST UI */
.search-results-list { display:flex; flex-direction:column; gap:8px; margin-top:16px; }
.list-word-row { background:var(--surface); border:1px solid var(--border); padding:12px 16px; border-radius:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.list-word-title { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:var(--text); letter-spacing:1px; }

/* FILTER STYLING USED BY BOTH SEARCH & QUIZ */
.filter-builder { border:1px dashed var(--border); padding:14px; border-radius:12px; margin-bottom:14px; background:rgba(0,0,0,0.1); }
.filter-selector-row { display:flex; gap:8px; }
.quiz-select { flex:1; min-width:0; padding:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; font-family:inherit; }
.btn-add-filter { padding:0 16px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:700; cursor:pointer; font-size:13px; }
.filter-stack { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.filter-item { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); padding:10px; border-radius:8px; flex-wrap:wrap; }
.not-toggle { display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--text2); cursor:pointer; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:transparent; min-width:46px; }
.not-toggle.active { color:var(--danger); border-color:var(--danger); background:rgba(247,106,106,0.05); }
.filter-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--accent2); font-weight:700; min-width:80px; flex:1; text-transform:uppercase; }
.filter-input-container { display:flex; align-items:center; gap:6px; flex:2; min-width:140px; }
.filter-value-input { width:100%; min-width:0; padding:8px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px; outline:none; }
.btn-remove-filter { background:none; border:none; color:var(--text2); cursor:pointer; font-size:18px; padding:4px; margin-left:auto; }

/* QUIZ UI */
.quiz-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px 20px; width:100%; }
.quiz-progress { display:flex; justify-content:space-between; font-family:'Space Mono',monospace; font-size:11px; color:var(--text2); margin-bottom:12px; }
.progress-bar { width:100%; height:4px; background:var(--surface2); border-radius:2px; margin-bottom:20px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.4s ease; }
.anagram-display { font-family:'Space Mono',monospace; font-size:36px; font-weight:700; color:var(--accent2); letter-spacing:6px; text-align:center; margin:14px 0; word-break:break-all; text-shadow:0 0 20px rgba(247,160,106,0.15); }
.quiz-word-status-bubble { text-align:center; font-family:'Space Mono',monospace; font-size:13px; color:var(--accent3); margin-bottom:14px; background:rgba(106,247,196,0.05); padding:6px; border-radius:8px; border:1px solid rgba(106,247,196,0.1); }

.quiz-actions-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.quiz-actions-triple { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:8px; }
.btn-clear, .btn-submit, .btn-analyze-trigger, .btn-mid-save { padding:12px 4px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; text-align:center; font-family:inherit; }
.btn-clear { background:var(--surface2); border:1px solid var(--border); color:var(--text2); }
.btn-submit { background:var(--accent); border:none; color:#fff; }
.btn-analyze-trigger { background:rgba(106,231,247,0.1); border:1px solid rgba(106,231,247,0.3); color:var(--info); }
.btn-mid-save { background:rgba(247,160,106,0.1); border:1px solid rgba(247,160,106,0.3); color:var(--accent2); }

/* ANALYZE PANEL */
.analyze-panel { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:14px; display:none; animation:fadeUp 0.2s ease; }
.analyze-section-title { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; margin-bottom:8px; letter-spacing:1px; }
.word-flex-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
.word-badge-info { padding:6px 12px; background:var(--info); color:#000; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; border-radius:6px; }
.word-badge-danger { padding:6px 12px; background:var(--danger); color:#000; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; border-radius:6px; }

.quiz-analysis { border-radius:12px; padding:16px; margin:12px 0; background:rgba(255,255,255,0.01); border:1px solid var(--border); }
.analysis-result { font-size:18px; font-weight:800; margin-bottom:8px; }
.analysis-result.correct { color:var(--success); }
.analysis-result.wrong { color:var(--danger); }
.analysis-word-block { margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
.analysis-word { font-family:'Space Mono',monospace; font-size:22px; color:var(--accent); }
.analysis-detail { font-size:13px; color:var(--text2); }
.next-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; }

/* CHALLENGE LOG */
.challenge-log-container { display:flex; flex-direction:column; gap:8px; margin-top:16px; max-height:220px; overflow-y:auto; }
.challenge-log-item { display:flex; justify-content:space-between; padding:10px 14px; border-radius:8px; font-family:'Space Mono',monospace; font-size:14px; }
.challenge-log-item.valid { background:rgba(106,247,160,0.08); border:1px solid rgba(106,247,160,0.2); color:var(--success); }
.challenge-log-item.invalid { background:rgba(247,106,106,0.08); border:1px solid rgba(247,106,106,0.2); color:var(--danger); }

.wl-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.wli-word { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); cursor:pointer; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:12px; font-size:13px; z-index:999; transition:all 0.3s ease; opacity:0; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<!-- FIXED SPINNING NEON LOADER SCREEN -->
<div id="loadingScreen">
  <div class="spinner-box">
    <div class="circle-border">
      <div class="circle-core"></div>
    </div>
  </div>
  <div class="load-status-text" id="statusText">Loading CSW24 Lexicon Assets...</div>
</div>

<header style="display:none" id="appHeader">
  <div class="logo">ZYZZYVA</div>
  <div class="word-count" id="wordCount">0 Words Loaded</div>
</header>

<nav style="display:none" id="appNav">
  <button class="tab active" onclick="showTab('search',this)"><span class="tab-icon">🔍</span>SEARCH</button>
  <button class="tab" onclick="showTab('quiz',this)"><span class="tab-icon">🧠</span>QUIZ</button>
  <button class="tab" onclick="showTab('challenge',this)"><span class="tab-icon">⚡</span>CHALLENGE</button>
  <button class="tab" onclick="showTab('wordlist',this)"><span class="tab-icon">📚</span>SAVED</button>
</nav>

<main style="display:none" id="appMain">
  <!-- ADVANCED SEARCH TAB -->
  <div class="section active" id="search">
    <div class="search-wrap" style="margin-bottom:12px;">
      <input class="search-input" id="searchInput" type="text" placeholder="WORD OR WILDCARD (?, .)..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" onkeydown="if(event.key==='Enter')executeAdvancedSearch()" oninput="this.value=this.value.toUpperCase()">
      <button class="search-btn" style="border:none;" onclick="executeAdvancedSearch()">→</button>
    </div>
    
    <!-- SEARCH ENGINE FILTER HOOK -->
    <div class="filter-builder" style="border-style:solid; border-color:rgba(255,255,255,0.05);">
      <div style="font-size:11px; color:var(--text2); margin-bottom:8px; font-family:'Space Mono',monospace;">⚡ FILTER & SUBANAGRAM SEARCH EXTENSIONS</div>
      <div class="filter-selector-row">
        <select class="quiz-select" id="searchFilterTypeSelect">
          <option value="none">[No Extra Filter]</option>
          <option value="subanagram">Subanagram Match</option>
          <option value="length">Length Range</option>
          <option value="score">Score Range</option>
          <option value="begins">Begins With</option>
          <option value="ends">Ends With</option>
        </select>
        <input type="text" class="filter-value-input" id="searchFilterValue" placeholder="Criteria value..." style="flex:1;">
        <button class="btn-add-filter" style="background:var(--surface2); border:1px solid var(--border);" onclick="executeAdvancedSearch()">APPLY</button>
      </div>
    </div>

    <div id="searchResultsContainer">
      <div class="empty-state" style="text-align:center; padding:40px; color:var(--text2); font-size:13px;">Use alphabets or wildcards like <b>P?TH.N</b> to crawl the dictionary.</div>
    </div>
  </div>

  <!-- QUIZ TAB -->
  <div class="section" id="quiz">
    <div id="quizContent"></div>
  </div>

  <!-- CHALLENGE TAB -->
  <div class="section" id="challenge">
    <div id="challengeContent"></div>
  </div>

  <!-- SAVED WORDS TAB -->
  <div class="section" id="wordlist">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div style="font-size:20px; font-weight:800;">📚 Bookmarked Words</div>
      <button class="btn-clear" style="padding:5px 12px;" onclick="clearWordList()">Clear All</button>
    </div>
    <div id="wordListContent"></div>
  </div>
</main>

<div class="toast" id="toast"></div>
<input type="file" id="zzqFileInput" style="display:none" accept=".zzq" onchange="handleZzqLoad(event)">

<script>
let dictionary = [];
let dictionarySet = new Set();
let wordsByLength = {};
let savedWords = JSON.parse(localStorage.getItem('zyzzyva_saved') || '[]');

const tileScores = {
  A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3,
  N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10
};

// Application States
let quizState = {
  active: false, filteredPool: [], currentRack: '', solutions: [], foundSolutions: [],
  setsCompleted: 0, questionCount: 0, activeFilters: [],
  isCurrentQuestionFaulty: false, historyWrongAndSkipped: [], historyPureWrong: []
};
let filterIdCounter = 0;
let challengeState = { active: false, timeLeft: 60, timerInterval: null, loggedWords: [] };

window.addEventListener('DOMContentLoaded', () => { autoLoadDictionary(); });

async function autoLoadDictionary() {
  const statusText = document.getElementById('statusText');
  
  // Dynamic Safe Transition Fallback (เด้งเข้าหน้าเว็บทันทีใน 5 วินาทีหากโหลดไฟล์ผ่านเซิร์ฟเวอร์ช้าเกินไป)
  const fallbackTimeout = setTimeout(() => {
    if(dictionary.length === 0) {
       statusText.innerText = "Entering Sandbox Mode...";
       enterAppDashboard();
    }
  }, 5000);

  try {
    statusText.innerText = "Loading CSW24 Lexicon Assets...";
    const response = await fetch('CSW24.txt');
    if (!response.ok) throw new Error("Could not find CSW24.txt");
    
    statusText.innerText = "Indexing CSW24 Assets...";
    const text = await response.text();
    dictionary = text.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
    
    if (dictionary.length === 0) throw new Error("Dictionary empty.");
    processDictionary();
    
    clearTimeout(fallbackTimeout);
    statusText.innerText = "Assets Loaded!";
    setTimeout(() => { enterAppDashboard(); }, 400);
  } catch (err) {
    statusText.innerText = "⚠️ Ready (Load .zzq inside to sync dictionary)";
    statusText.style.color = "var(--accent2)";
    console.warn("CSW24.txt fetching skipped. Waiting manual .zzq upload injection.");
  }
}

function enterAppDashboard() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('appNav').style.display = 'flex';
  document.getElementById('appMain').style.display = 'block';
  loadSavedWords();
  initQuizSettings();
  initChallengeIntro();
}

function processDictionary() {
  dictionarySet = new Set(dictionary);
  wordsByLength = {};
  dictionary.sort((a, b) => a.length - b.length || a.localeCompare(b));
  dictionary.forEach(word => {
    const len = word.length;
    if (!wordsByLength[len]) wordsByLength[len] = [];
    wordsByLength[len].push(word);
  });
  document.getElementById('wordCount').innerText = `${dictionary.length.toLocaleString()} CSW24 Words`;
}

function calculateWordScore(word) {
  let s = 0; for (let char of word) { s += tileScores[char] || 0; } return s;
}

function showTab(tabId, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Helper: Check Subanagram conditions
function isSubanagram(candidate, rack) {
  let rChars = rack.split('');
  for (let char of candidate) {
    let idx = rChars.indexOf(char);
    if (idx !== -1) rChars.splice(idx, 1); else return false;
  }
  return true;
}

// ============================================================
// ADVANCED SEARCH SYSTEMS (LISTS, WILDCARDS, EXTENDED FILTERS)
// ============================================================
function executeAdvancedSearch() {
  const queryInput = document.getElementById('searchInput').value.trim().toUpperCase();
  const container = document.getElementById('searchResultsContainer');
  const filterType = document.getElementById('searchFilterTypeSelect').value;
  const filterVal = document.getElementById('searchFilterValue').value.trim().toUpperCase();

  let regexQuery = null;
  if (queryInput) {
    let formattedPattern = queryInput.replace(/[\.\?]/g, '.');
    regexQuery = new RegExp("^" + formattedPattern + "$");
  }

  let results = dictionary.filter(word => {
    if (regexQuery && !regexQuery.test(word)) return false;

    if (filterType === 'subanagram' && filterVal) { if (!isSubanagram(word, filterVal)) return false; }
    else if (filterType === 'length' && filterVal) { if (word.length != parseInt(filterVal)) return false; }
    else if (filterType === 'score' && filterVal) { if (calculateWordScore(word) != parseInt(filterVal)) return false; }
    else if (filterType === 'begins' && filterVal) { if (!word.startsWith(filterVal)) return false; }
    else if (filterType === 'ends' && filterVal) { if (!word.endsWith(filterVal)) return false; }

    return true;
  });

  if (results.length === 0) {
    container.innerHTML = `<div class="empty-state" style="text-align:center; padding:40px; color:var(--text2);">0 matching records found.</div>`;
    return;
  }

  let slicedResults = results.slice(0, 250);
  let html = `<div style="font-size:12px; color:var(--text2); margin-bottom:8px; font-family:monospace;">Showing ${slicedResults.length} of ${results.length} results:</div>`;
  html += `<div class="search-results-list">`;
  html += slicedResults.map(w => `
    <div class="list-word-row">
      <div>
        <span class="list-word-title" onclick="quickBookmark('${w}')" style="cursor:pointer;" title="Click to Save">${w}</span>
        <div style="font-size:11px; color:var(--text2); margin-top:2px;">${w.length} letters</div>
      </div>
    </div>
  `).join('');
  html += `</div>`;
  container.innerHTML = html;
}

function quickBookmark(word) { toggleSaveWord(word); }

// ============================================================
// QUIZ CORE ENGINE (MULTI-WORD CONFIGURATIONS)
// ============================================================
function initQuizSettings() {
  quizState.active = false;
  const content = document.getElementById('quizContent');
  content.innerHTML = `
    <div class="quiz-card">
      <h2 style="font-size:18px; font-weight:800; margin-bottom:14px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">🧠 Anagram Training Module</h2>
      
      <button class="btn-sync" style="width:100%; margin-bottom:14px; padding:12px;" onclick="document.getElementById('zzqFileInput').click()">📂 LOAD .ZZQ EXTERNAL FILE</button>

      <div class="filter-builder">
        <div style="font-size:11px; color:var(--text2); margin-bottom:8px; font-family:'Space Mono',monospace;">BUILD FILTER PARAMETERS</div>
        <div class="filter-selector-row">
          <select class="quiz-select" id="filterTypeSelect">
            <option value="subanagram">Subanagram Match</option>
            <option value="length">Length Range</option>
            <option value="score">Score Range</option>
            <option value="includes">Includes Letters</option>
            <option value="begins">Begins With</option>
            <option value="ends">Ends With</option>
            <option value="pattern">Pattern Match</option>
          </select>
          <button class="btn-add-filter" onclick="addNewFilterItem()">+ ADD</button>
        </div>
      </div>
      <div class="filter-stack" id="filterStack"></div>
      <button class="start-btn" style="margin-top:8px;" onclick="compileFiltersAndStart()">START COMPILATION QUIZ</button>
    </div>
  `;
  renderFilterStack();
}

function addNewFilterItem() {
  const type = document.getElementById('filterTypeSelect').value; filterIdCounter++;
  let newItem = { id: filterIdCounter, type: type, val1: '', val2: '', isNot: false };
  if (type === 'length') { newItem.val1 = '2'; newItem.val2 = '6'; }
  if (type === 'score') { newItem.val1 = '5'; newItem.val2 = '25'; }
  quizState.activeFilters.push(newItem);
  renderFilterStack();
}

function removeFilterItem(id) { quizState.activeFilters = quizState.activeFilters.filter(f => f.id !== id); renderFilterStack(); }
function toggleFilterNot(id) { const item = quizState.activeFilters.find(f => f.id === id); if (item) item.isNot = !item.isNot; renderFilterStack(); }
function updateFilterVal(id, field, value) { const item = quizState.activeFilters.find(f => f.id === id); if (item) item[field] = value.toUpperCase(); }

function renderFilterStack() {
  const container = document.getElementById('filterStack'); if (!container) return;
  if (quizState.activeFilters.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:var(--text2); font-size:12px; padding:10px 0;">No parameters active.</div>`;
    return;
  }
  container.innerHTML = quizState.activeFilters.map(f => {
    let inputsHtml = '';
    if (f.type === 'length' || f.type === 'score') {
      inputsHtml = `
        <input type="number" class="filter-value-input" style="flex:1;" value="${f.val1}" placeholder="Min" onchange="updateFilterVal(${f.id}, 'val1', this.value)">
        <span style="color:var(--text2); font-size:11px;">-</span>
        <input type="number" class="filter-value-input" style="flex:1;" value="${f.val2}" placeholder="Max" onchange="updateFilterVal(${f.id}, 'val2', this.value)">
      `;
    } else {
      let ph = "Value..."; if (f.type === 'subanagram') ph = "Available rack letters...";
      inputsHtml = `<input type="text" class="filter-value-input" value="${f.val1}" placeholder="${ph}" oninput="updateFilterVal(${f.id}, 'val1', this.value)">`;
    }
    return `
      <div class="filter-item">
        <button class="not-toggle ${f.isNot ? 'active' : ''}" onclick="toggleFilterNot(${f.id})">NOT</button>
        <div class="filter-label">${f.type}</div>
        <div class="filter-input-container">${inputsHtml}</div>
        <button class="btn-remove-filter" onclick="removeFilterItem(${f.id})">✕</button>
      </div>
    `;
  }).join('');
}

function compileFiltersAndStart() {
  if(dictionary.length === 0 && quizState.filteredPool.length === 0) {
     alert("Please upload a .zzq file layout first to initialize dictionary data.");
     return;
  }
  
  let pool = dictionary.filter((word) => {
    for (let f of quizState.activeFilters) {
      let match = true;
      if (f.type === 'length') { match = (word.length >= (parseInt(f.val1)||0) && word.length <= (parseInt(f.val2)||Infinity)); }
      else if (f.type === 'score') { let s = calculateWordScore(word); match = (s >= (parseInt(f.val1)||0) && s <= (parseInt(f.val2)||Infinity)); }
      else if (f.type === 'subanagram') { if (!f.val1) continue; match = isSubanagram(word, f.val1); }
      else if (f.type === 'includes') { if (!f.val1) continue; match = f.val1.split('').every(c => word.includes(c)); }
      else if (f.type === 'begins') { if (!f.val1) continue; match = word.startsWith(f.val1); }
      else if (f.type === 'ends') { if (!f.val1) continue; match = word.endsWith(f.val1); }
      else if (f.type === 'pattern') { if (!f.val1) continue; match = new RegExp("^" + f.val1.replace(/\?/g, '.').replace(/\*/g, '.*') + "$").test(word); }
      if (f.isNot) match = !match; if (!match) return false;
    }
    return true;
  });
  if (pool.length === 0 && quizState.filteredPool.length === 0) { alert("❌ Filter configs generated 0 words pool."); return; }
  
  if(pool.length > 0) quizState.filteredPool = pool;
  
  quizState.active = true; quizState.setsCompleted = 0; quizState.questionCount = 0;
  quizState.historyWrongAndSkipped = []; quizState.historyPureWrong = [];
  nextQuizQuestion();
}

function nextQuizQuestion() {
  quizState.questionCount++; quizState.isCurrentQuestionFaulty = false;
  quizState.foundSolutions = [];
  
  const baseWord = quizState.filteredPool[Math.floor(Math.random() * quizState.filteredPool.length)];
  quizState.currentRack = baseWord.split('').sort().join('');
  quizState.solutions = [];
  
  // Scans source
  const searchPool = dictionary.length > 0 ? (wordsByLength[baseWord.length] || []) : quizState.filteredPool;
  searchPool.forEach(w => { 
    if (w.length === baseWord.length && w.split('').sort().join('') === quizState.currentRack) {
       if(!quizState.solutions.includes(w)) quizState.solutions.push(w); 
    }
  });
  renderQuizScreen();
}

function renderQuizScreen() {
  const content = document.getElementById('quizContent');
  content.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">
        <span>SETS COMPLETED: <b>${quizState.setsCompleted}</b></span>
        <span>RACK TARGETS: ${quizState.questionCount}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, (quizState.setsCompleted / 10) * 100)}%"></div></div>
      
      <div class="quiz-mode-label" style="text-align:center;">ANAGRAM RACK</div>
      <div class="anagram-display">${quizState.currentRack}</div>
      
      <div class="quiz-word-status-bubble">
         🎯 STATS FOR THIS RACK: <b>${quizState.foundSolutions.length}</b> / <b>${quizState.solutions.length}</b> WORDS FOUND
      </div>

      <div style="margin: 14px 0;">
        <input type="text" id="quizInput" class="search-input" placeholder="TYPE INDIVIDUAL WORD..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" style="text-align:center;" onkeydown="if(event.key==='Enter')submitQuizAnswer()" oninput="this.value=this.value.toUpperCase()">
        <div id="quizSetTrackerLive" style="margin-top:8px; font-family:monospace; font-size:12px; color:var(--success); text-align:center;">
           ${quizState.foundSolutions.length > 0 ? 'Found: ' + quizState.foundSolutions.join(', ') : ''}
        </div>
      </div>
      
      <div class="quiz-actions-grid">
        <button class="btn-clear" onclick="revealQuizResult(false)">SURRENDER</button>
        <button class="btn-submit" onclick="submitQuizAnswer()">SUBMIT WORD</button>
      </div>

      <div class="quiz-actions-triple">
        <button class="btn-mid-save" onclick="exportCurrentPoolToZzq()">💾 SAVE .ZZQ</button>
        <button class="btn-analyze-trigger" onclick="toggleAnalyzePanel()">📊 ANALYZE</button>
        <button class="btn-clear" style="color:var(--danger);" onclick="initQuizSettings()">⚙️ QUIT</button>
      </div>

      <div class="analyze-panel" id="liveAnalyzePanel">
        <div class="analyze-section-title" style="color:var(--info);">📘 WRONG / SKIPPED WORDS HISTORY</div>
        <div class="word-flex-grid" id="analyzeInfoContainer"></div>
        <div class="analyze-section-title" style="color:var(--danger);">📕 INCORRECT GUESS ATTEMPTS</div>
        <div class="word-flex-grid" id="analyzeDangerContainer"></div>
      </div>

      <div id="quizFeedbackSlot"></div>
    </div>
  `;
  setTimeout(() => { const i = document.getElementById('quizInput'); if(i) i.focus(); }, 100);
}

function submitQuizAnswer() {
  const input = document.getElementById('quizInput'); if (!input) return;
  const ans = input.value.trim().toUpperCase(); if (!ans) return;

  if (quizState.solutions.includes(ans)) {
    if (quizState.foundSolutions.includes(ans)) {
      showToast(`Already answered: ${ans}`);
    } else {
      quizState.foundSolutions.push(ans);
      showToast(`✓ Found word: ${ans}!`);
      
      if (quizState.foundSolutions.length === quizState.solutions.length) {
        if (!quizState.isCurrentQuestionFaulty) quizState.setsCompleted++;
        revealQuizResult(true);
        return;
      }
    }
  } else {
    quizState.isCurrentQuestionFaulty = true;
    if (!quizState.historyPureWrong.includes(ans)) quizState.historyPureWrong.push(ans);
    showToast(`❌ ${ans} is invalid!`);
  }
  input.value = ""; input.focus(); renderQuizScreen();
}

function revealQuizResult(isComplete) {
  const input = document.getElementById('quizInput'); if (input) input.disabled = true;

  if (!isComplete || quizState.isCurrentQuestionFaulty) {
    quizState.solutions.forEach(w => { if(!quizState.historyWrongAndSkipped.includes(w)) quizState.historyWrongAndSkipped.push(w); });
  }

  const slot = document.getElementById('quizFeedbackSlot');
  let sClass = (isComplete && !quizState.isCurrentQuestionFaulty) ? 'correct' : 'wrong';
  let title = (isComplete && !quizState.isCurrentQuestionFaulty) ? '✓ SET COMPLETED!' : (isComplete ? '⚠ CLEARED WITH ERRORS' : 'SURRENDERED SET');

  let html = `<div class="quiz-analysis"><div class="analysis-result ${sClass}">${title}</div><div class="hooks-label">FULL SOLUTIONS IN RACK:</div>`;
  quizState.solutions.forEach(word => {
    const hooks = getHooks(word);
    html += `<div class="analysis-word-block"><div class="analysis-word">${word}</div><div class="analysis-detail">Hooks: F[${hooks.front.join('') || '-'}] B[${hooks.back.join('') || '-'}]</div></div>`;
  });
  html += `<button class="next-btn" onclick="nextQuizQuestion()">NEXT RACK →</button></div>`;
  slot.innerHTML = html;
}

function toggleAnalyzePanel() {
  const p = document.getElementById('liveAnalyzePanel'); if(!p) return;
  if(p.style.display === "block") { p.style.display = "none"; } else {
    document.getElementById('analyzeInfoContainer').innerHTML = quizState.historyWrongAndSkipped.map(w => `<span class="word-badge-info">${w}</span>`).join('') || '<span style="color:var(--text2); font-size:11px;">None</span>';
    document.getElementById('analyzeDangerContainer').innerHTML = quizState.historyPureWrong.map(w => `<span class="word-badge-danger">${w}</span>`).join('') || '<span style="color:var(--text2); font-size:11px;">None</span>';
    p.style.display = "block";
  }
}

function exportCurrentPoolToZzq() {
  if(!quizState.filteredPool || quizState.filteredPool.length === 0) return;
  let textOut = quizState.filteredPool.join("\r\n");
  let blob = new Blob([textOut], { type: "text/plain;charset=utf-8" });
  let a = document.createElement("a");
  a.download = `zyzzyva_pool_${new Date().toISOString().slice(0,10)}.zzq`;
  a.href = window.URL.createObjectURL(blob);
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast("Quiz track data saved to .zzq");
}

function handleZzqLoad(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    let lines = e.target.result.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
    if(lines.length === 0) { alert("Empty file structure."); return; }
    
    if(dictionary.length > 0) {
       quizState.filteredPool = lines.filter(w => dictionarySet.has(w));
    } else {
       quizState.filteredPool = lines; 
    }
    
    quizState.active = true; quizState.setsCompleted = 0; quizState.questionCount = 0;
    showToast(`Injected ${quizState.filteredPool.length} records.`);
    nextQuizQuestion();
  };
  reader.readAsText(file);
}

function getHooks(word) {
  if(dictionary.length === 0) return { front: [], back: [] };
  const alphas = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; const front = []; const back = [];
  for (let a of alphas) { if (dictionarySet.has(a + word)) front.push(a); if (dictionarySet.has(word + a)) back.push(a); }
  return { front, back };
}

// NEW CHALLENGE SYSTEM (WRITE & EVALUATE INFINITE LIST)
// ============================================================
function initChallengeIntro() {
  const content = document.getElementById('challengeContent');
  content.innerHTML = `
    <div class="challenge-intro">
      <h2>⚡ Word Blitz Input Arena</h2>
      <p>Type as many valid vocabulary words as you can recall before the stopwatch ticks down to zero!</p>
      <div class="challenge-stats" style="display:block;">
        <div class="stat-box"><div class="stat-val">60s</div><div class="stat-lbl">Time Engine</div></div>
      </div>
      <button class="start-btn" onclick="startChallengeArena()">START ARENA SESSION</button>
    </div>
  `;
}

function startChallengeArena() {
  challengeState.active = true; challengeState.timeLeft = 60; challengeState.loggedWords = [];
  const content = document.getElementById('challengeContent');
  content.innerHTML = `
    <div class="quiz-card">
      <div class="c-header" style="display:flex; justify-content:space-between; align-items:center;">
        <div class="hooks-label" style="font-size:14px; color:var(--accent3);">⚡ ARENA ACTIVE</div>
        <div class="timer" id="arenaTimer">60</div>
      </div>
      
      <div style="margin:20px 0;">
        <input type="text" id="arenaInputField" class="search-input" placeholder="WRITE WORDS TO CHECK..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" onkeydown="if(event.key==='Enter')evaluateArenaInput()" oninput="this.value=this.value.toUpperCase()">
      </div>

      <div class="hooks-label">EVALUATION JOURNAL LOG:</div>
      <div class="challenge-log-container" id="arenaJournalLog"></div>
    </div>
  `;
  setTimeout(() => document.getElementById('arenaInputField').focus(), 100);
  
  challengeState.timerInterval = setInterval(() => {
    challengeState.timeLeft--; const div = document.getElementById('arenaTimer'); if(!div) return; div.innerText = challengeState.timeLeft;
    if (challengeState.timeLeft <= 5) div.style.color = "var(--danger)";
    if (challengeState.timeLeft <= 0) endChallengeArena();
  }, 1000);
}

function evaluateArenaInput() {
  const input = document.getElementById('arenaInputField'); if(!input || !challengeState.active) return;
  const word = input.value.trim().toUpperCase(); if(!word) return;

  if(challengeState.loggedWords.some(item => item.w === word)) {
     showToast("Word already logged!"); input.value = ""; return;
  }

  // Fallback match condition if lexicon didn't load inside sandboxed systems
  const isValid = dictionary.length > 0 ? dictionarySet.has(word) : (word.length >= 2);
  challengeState.loggedWords.unshift({ w: word, status: isValid ? 'valid' : 'invalid' });

  document.getElementById('arenaJournalLog').innerHTML = challengeState.loggedWords.map(item => `
     <div class="challenge-log-item ${item.status}">
       <span>${item.w}</span>
       <span>${item.status === 'valid' ? '✓ VALID' : '✗ PHONY'}</span>
     </div>
  `).join('');
  
  input.value = ""; input.focus();
}

function endChallengeArena() {
  clearInterval(challengeState.timerInterval); challengeState.active = false;
  const content = document.getElementById('challengeContent');
  content.innerHTML = `
    <div style="text-align:center; padding:24px;">
      <div style="font-size:44px;">🏁</div>
      <h2 style="font-size:24px; margin:10px 0;">ARENA CONCLUDED</h2>
      <div class="word-count" style="margin-bottom:14px; font-size:14px;">Total Words Processed: ${challengeState.loggedWords.length}</div>
      <button class="start-btn" onclick="initChallengeIntro()">BACK TO DASHBOARD</button>
    </div>
  `;
}

// BOOKMARKS LOGIC
function loadSavedWords() {
  const content = document.getElementById('wordListContent'); if (savedWords.length === 0) { content.innerHTML = `<div class="empty-state" style="text-align:center; padding:40px; color:var(--text2);">No bookmarks recorded.</div>`; return; }
  content.innerHTML = savedWords.map(w => `<div class="wl-item"><div><div class="wli-word" onclick="document.getElementById('searchInput').value='${w}'; executeAdvancedSearch(); showTab('search', document.querySelectorAll('.tab')[0]);">${w}</div></div><button class="btn-clear" style="color:var(--danger);" onclick="toggleSaveWord('${w}')">🗑️</button></div>`).join('');
}
function toggleSaveWord(word) {
  if (savedWords.includes(word)) { savedWords = savedWords.filter(w => w !== word); showToast(`Removed ${word}`); } 
  else { savedWords.push(word); showToast(`Saved ${word}`); }
  localStorage.setItem('zyzzyva_saved', JSON.stringify(savedWords)); loadSavedWords();
}
function clearWordList() { if (confirm("Clear bookmark tracks?")) { savedWords = []; localStorage.setItem('zyzzyva_saved', '[]'); loadSavedWords(); } }
