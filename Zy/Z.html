<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZYZZYVA — Quiz System</title>
<style>
:root { --bg:#0a0a0f; --surface:#12121a; --border:#2a2a3d; --accent:#7c6af7; --text:#e8e8f0; --text2:#8888aa; --success:#6af7a0; --danger:#f76a6a; }
body { background:var(--bg); color:var(--text); font-family:sans-serif; margin:0; padding:20px; }
.card { background:var(--surface); border:1px solid var(--border); padding:20px; border-radius:15px; margin-bottom:15px; }
.btn { padding:12px 20px; border-radius:8px; border:none; background:var(--accent); color:white; cursor:pointer; font-weight:bold; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
input { background:var(--bg); border:1px solid var(--border); color:white; padding:10px; width:100%; box-sizing:border-box; border-radius:8px; }
#quiz-area, #analysis-area { display:none; }
.result-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); }
</style>
</head>
<body>

<div id="setup-area" class="card">
    <h2>Quiz Setup</h2>
    <label>Quiz Type:</label>
    <select id="quizType" class="quiz-select">
        <option value="anagram">Anagram Quiz</option>
        <option value="flashcard">Flashcard Mode</option>
    </select>
    <br><br>
    <button class="btn" onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz-area" class="card">
    <div id="question-display" style="font-size:24px; font-weight:bold; margin-bottom:10px;">---</div>
    <div id="input-area">
        <input type="text" id="quizInput" placeholder="Enter word..." onkeydown="if(event.key==='Enter')addAnswer()">
    </div>
    <div id="answers-list" style="margin:15px 0;"></div>
    <button class="btn" id="checkBtn" onclick="checkAnswers()">Check Answers</button>
    <button class="btn" onclick="nextQuestion()">Next Question →</button>
    <button class="btn" style="background:var(--text2)" onclick="analyzeQuiz()">Analyze Quiz</button>
</div>

<div id="analysis-area" class="card">
    <h2>Performance Analysis</h2>
    <div id="stats"></div>
    <button class="btn" onclick="document.getElementById('analysis-area').style.display='none'">Close</button>
</div>

<script>
let state = {
    type: 'anagram',
    questions: ["SATIRE", "PENSION", "RETAIN"],
    currentIndex: 0,
    responses: [], // เก็บคำตอบของผู้ใช้
    answers: { "SATIRE": ["SATIRE", "ARTIES", "STAIRE"], "PENSION": ["PENSION", "PINEONS"], "RETAIN": ["RETAIN", "RETINA"] },
    correctCount: 0,
    totalValid: 0,
    totalSubmitted: 0
};

function startQuiz() {
    state.type = document.getElementById('quizType').value;
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    
    [span_8](start_span)// ตั้งค่า Flashcard Mode[span_8](end_span)
    if(state.type === 'flashcard') {
        document.getElementById('input-area').style.display = 'none';
    }
    loadQuestion();
}

function loadQuestion() {
    document.getElementById('question-display').innerText = state.questions[state.currentIndex];
    document.getElementById('answers-list').innerHTML = '';
    state.responses = [];
}

function addAnswer() {
    if(state.type === 'flashcard') return;
    const input = document.getElementById('quizInput');
    const val = input.value.toUpperCase();
    if(!val) return;
    
    state.responses.push(val);
    input.value = '';
    
    [span_9](start_span)// แสดงผลคำตอบที่พิมพ์[span_9](end_span)
    const div = document.createElement('div');
    div.innerText = val;
    document.getElementById('answers-list').appendChild(div);
}

function checkAnswers() {
    [span_10](start_span)// ระบบตรวจสอบคำตอบ[span_10](end_span)
    const correctWords = state.answers[state.questions[state.currentIndex]] || [];
    let correctForThis = 0;
    
    state.responses.forEach(r => {
        if(correctWords.includes(r)) correctForThis++;
    });

    [span_11](start_span)// ถ้าเป็น Flashcard Mode จะแสดงคำตอบทั้งหมดทันที[span_11](end_span)
    if(state.type === 'flashcard') {
        document.getElementById('answers-list').innerText = "Answers: " + correctWords.join(', ');
    } else {
        alert("Correct: " + correctForThis + " of " + correctWords.length);
    }
    
    state.correctCount += correctForThis;
    state.totalValid += correctWords.length;
    state.totalSubmitted += state.responses.length;
}

function nextQuestion() {
    state.currentIndex++;
    if(state.currentIndex >= state.questions.length) alert("Quiz Finished!");
    else loadQuestion();
}

function analyzeQuiz() {
    [span_12](start_span)[span_13](start_span)// การคำนวณ Recall และ Precision[span_12](end_span)[span_13](end_span)
    const recall = state.totalValid > 0 ? (state.correctCount / state.totalValid * 100).toFixed(1) : 0;
    const precision = state.totalSubmitted > 0 ? (state.correctCount / state.totalSubmitted * 100).toFixed(1) : 0;
    
    document.getElementById('analysis-area').style.display = 'block';
    document.getElementById('stats').innerHTML = `
        <div class="result-row">Recall: ${recall}% (${state.correctCount}/${state.totalValid})</div>
        <div class="result-row">Precision: ${precision}% (${state.correctCount}/${state.totalSubmitted})</div>
    `;
}
</script>
</body>
</html>
